# TASK 42 — extra engine VERSIONS for compatibility testing, SEPARATE from the
# TASK 01 setup (docker-compose.yml). Distinct container names, host ports, and
# named volumes so nothing collides with dbtool-postgres (5432) / dbtool-mysql
# (3306). Each is seeded with the SAME ./init/<engine> scripts as TASK 01.
#
# Usage (from this docker/ folder):
#   docker compose -f docker-compose.versions.yml up -d
#   docker compose -f docker-compose.versions.yml ps
#   docker compose -f docker-compose.versions.yml down      # (keeps volumes)
#   docker compose -f docker-compose.versions.yml down -v   # remove volumes too
#
# Ports: PG13→5433, PG14→5434, PG15→5435, MySQL5.7→3307.
services:
  pg13:
    image: postgres:13
    container_name: dbtool-pg13
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: dbtool
      POSTGRES_PASSWORD: dbtool
      POSTGRES_DB: dbtool_dev
    volumes:
      - pg13data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbtool"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    networks:
      - dbtool-versions

  pg14:
    image: postgres:14
    container_name: dbtool-pg14
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: dbtool
      POSTGRES_PASSWORD: dbtool
      POSTGRES_DB: dbtool_dev
    volumes:
      - pg14data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbtool"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    networks:
      - dbtool-versions

  pg15:
    image: postgres:15
    container_name: dbtool-pg15
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: dbtool
      POSTGRES_PASSWORD: dbtool
      POSTGRES_DB: dbtool_dev
    volumes:
      - pg15data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbtool"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    networks:
      - dbtool-versions

  mysql57:
    image: mysql:5.7
    container_name: dbtool-mysql57
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: dbtool_dev
      MYSQL_USER: dbtool
      MYSQL_PASSWORD: dbtool
    volumes:
      - mysql57data:/var/lib/mysql
      - ./init/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -prootpw"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    networks:
      - dbtool-versions

  # MariaDB (TASK 43) — first-class engine. Seeded with the SAME MySQL init SQL
  # (MariaDB is MySQL-compatible: JSON is a LONGTEXT alias, CHECK is enforced,
  # utf8mb4/InnoDB all supported).
  mariadb:
    image: mariadb:11
    container_name: dbtool-mariadb
    ports:
      - "3308:3306"
    environment:
      MARIADB_ROOT_PASSWORD: rootpw
      MARIADB_DATABASE: dbtool_dev
      MARIADB_USER: dbtool
      MARIADB_PASSWORD: dbtool
    volumes:
      - mariadbdata:/var/lib/mysql
      - ./init/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    networks:
      - dbtool-versions

  # Oracle XE (TASK 45) — free Oracle for testing the Oracle engine. gvenzl image
  # creates the APP_USER (dbtool) in the XEPDB1 pluggable DB. Takes a while to
  # initialize on first run. Seeded via a separate script after it's healthy.
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: dbtool-oracle
    ports:
      - "1522:1521"
    environment:
      ORACLE_PASSWORD: oraclepw
      APP_USER: dbtool
      APP_USER_PASSWORD: dbtool
    volumes:
      - oracledata:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2560M
    networks:
      - dbtool-versions

  # Microsoft SQL Server 2022 (TASK 58) — first-class engine. SA login for the
  # dev environment; a strong SA password is required by the image. Seeded via a
  # separate script after it's healthy (creates the dbtool_dev database + tables).
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dbtool-mssql
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "DbTool!Passw0rd"
      MSSQL_PID: "Developer"
    volumes:
      - mssqldata:/var/opt/mssql
    healthcheck:
      # tools18 sqlcmd needs -C (trust self-signed cert). SA password from env.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2560M
    networks:
      - dbtool-versions

networks:
  dbtool-versions:
    driver: bridge

volumes:
  pg13data:
  pg14data:
  pg15data:
  mysql57data:
  mariadbdata:
  oracledata:
  mssqldata:
